  status: open
  title: Write doob.baml in devloop using generated OpenAPI spec
  description: |
    Once mcpipe PR #1 and doob PR #2 merge:
    1. Run: mcpipe --cli doob --gen-openapi --openapi-output doob.openapi.yaml
    2. Write devloop/crates/baml/baml_src/doob.baml — one class per response shape,
       one function per operation, following maestro.baml pattern.
    3. All basic functions use haiku client.
    4. Run baml generate to produce Rust client.
    Repeat for obfsck, devkit, minibox once they get schema subcommands.
