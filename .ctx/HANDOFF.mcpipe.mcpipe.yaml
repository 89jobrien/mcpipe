- id: mcpipe-17
  name: circular-ref-infinite-loop
  priority: P1
  status: open
  title: resolve_refs can infinite-loop on circular $ref chains in OpenAPI specs
  description: |
    resolve_refs in openapi.rs has no cycle detection. A spec with a circular
    $ref causes a stack overflow. Add a seen-set or depth cap before recursing.
  files:
  - src/backend/openapi.rs
  extra: []
