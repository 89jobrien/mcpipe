  title: StdioSession::send_request has no timeout — hangs forever if MCP server stalls
  description: |
    send_request awaits indefinitely. Add a configurable timeout (default 30s)
    with a descriptive error on expiry.
  files:
  - src/backend/mcp.rs
  extra: []
