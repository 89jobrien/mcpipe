info:
  title: doob
  version: 0.1.0
openapi: 3.1.0
paths:
  /archive-list:
    get:
      operationId: archive-list
      parameters:
      - description: Filter by project
        in: query
        name: project
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: List archived todos
  /handoff-list:
    get:
      operationId: handoff-list
      parameters:
      - description: Filter by project
        in: query
        name: project
        required: false
        schema:
          type: string
      - description: Filter by status
        in: query
        name: status
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: List handoff items
  /handoff-sync:
    post:
      operationId: handoff-sync
      requestBody:
        content:
          application/json:
            schema:
              properties:
                file:
                  description: Path to HANDOFF.yaml
                  type: string
              required:
              - file
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Bidirectional sync with HANDOFF.yaml
  /note-add:
    post:
      operationId: note-add
      requestBody:
        content:
          application/json:
            schema:
              properties:
                content:
                  description: Note content
                  items:
                    type: string
                  type: array
                project:
                  description: Project name
                  type: string
                tags:
                  description: Comma-separated tags
                  type: string
              required:
              - content
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Add one or more notes
  /note-list:
    get:
      operationId: note-list
      parameters:
      - description: Filter by project
        in: query
        name: project
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: List notes
  /note-remove:
    post:
      operationId: note-remove
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ids:
                  description: Note ID(s)
                  items:
                    type: string
                  type: array
              required:
              - ids
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Remove notes
  /search:
    post:
      operationId: search
      requestBody:
        content:
          application/json:
            schema:
              properties:
                project:
                  description: Filter by project
                  type: string
                query:
                  description: Search query
                  type: string
                type:
                  description: 'Filter by type: todo, note, or all'
                  type: string
              required:
              - query
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Full-text search across todos and notes
  /stats:
    get:
      operationId: stats
      parameters:
      - description: Filter by project
        in: query
        name: project
        required: false
        schema:
          type: string
      - description: Time window in days
        in: query
        name: window
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Analytics and statistics
  /todo-add:
    post:
      operationId: todo-add
      requestBody:
        content:
          application/json:
            schema:
              properties:
                blocked_by:
                  description: UUIDs that block this todo
                  type: string
                blocks:
                  description: UUIDs this todo blocks
                  type: string
                content:
                  description: Task description(s)
                  items:
                    type: string
                  type: array
                priority:
                  description: Priority level
                  type: string
                project:
                  description: Project name
                  type: string
                tags:
                  description: Comma-separated tags
                  type: string
              required:
              - content
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Add one or more todos
  /todo-complete:
    post:
      operationId: todo-complete
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ids:
                  description: Todo ID(s)
                  items:
                    type: string
                  type: array
              required:
              - ids
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Complete one or more todos
  /todo-deps:
    post:
      operationId: todo-deps
      requestBody:
        content:
          application/json:
            schema:
              properties:
                id:
                  description: Todo UUID
                  type: string
              required:
              - id
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Show dependency chain for a todo
  /todo-due:
    post:
      operationId: todo-due
      requestBody:
        content:
          application/json:
            schema:
              properties:
                date:
                  description: Due date (YYYY-MM-DD or 'clear')
                  type: string
                id:
                  description: Todo ID
                  type: string
              required:
              - id
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Set or clear due date for a todo
  /todo-list:
    get:
      operationId: todo-list
      parameters:
      - description: Filter by status
        in: query
        name: status
        required: false
        schema:
          type: string
      - description: Filter by project
        in: query
        name: project
        required: false
        schema:
          type: string
      - description: Max results
        in: query
        name: limit
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: List todos
  /todo-remove:
    post:
      operationId: todo-remove
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ids:
                  description: Todo ID(s)
                  items:
                    type: string
                  type: array
              required:
              - ids
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Remove todos
  /todo-undo:
    post:
      operationId: todo-undo
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ids:
                  description: Todo ID(s)
                  items:
                    type: string
                  type: array
              required:
              - ids
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Success
      summary: Undo completion — mark todos as pending
